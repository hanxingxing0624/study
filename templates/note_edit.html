{% extends "base.html" %}
{% block title %}{% if note %}编辑笔记{% else %}新建笔记{% endif %}{% endblock %}
{% block content %}
<div class="page-header">
    <h2>{% if note %}编辑笔记{% else %}新建笔记{% endif %}</h2>
    <a href="{% if note %}/notes/{{ note.id }}{% else %}/{% endif %}" class="btn btn-secondary btn-sm">取消</a>
</div>

{% if error %}<div class="flash flash-error">{{ error }}</div>{% endif %}

<form id="note-form" method="post"
    action="{% if note %}/notes/{{ note.id }}/edit{% else %}/notes/new{% endif %}">

    <input type="hidden" name="content" id="content"
        value="{{ note.content | e if note else '' }}">

    <div class="form-group">
        <input type="text" id="title" name="title" required
            value="{{ note.title | e if note else '' }}"
            placeholder="Note title..."
            style="font-size:1.05rem;font-weight:550;border:none;border-bottom:2px solid var(--border);border-radius:0;padding-left:0;background:transparent;">
    </div>

    <div class="form-row" style="margin-bottom:0.75rem;">
        <div class="form-group">
            <label for="folder_id">文件夹</label>
            <select id="folder_id" name="folder_id">
                <option value="">无</option>
                {% for f in folders %}
                <option value="{{ f.id }}" {% if note and note.folder_id == f.id %}selected{% endif %}>{{ f.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="status">状态</label>
            <select id="status" name="status">
                <option value="计划中" {% if note and note.status == '计划中' %}selected{% endif %}>计划中</option>
                <option value="进行中" {% if note and note.status == '进行中' %}selected{% endif %}>进行中</option>
                <option value="已完成" {% if note and note.status == '已完成' %}selected{% endif %}>已完成</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label for="tags">标签</label>
        <input type="text" id="tags" name="tags"
            value="{% if note %}{% for nt in note.tags %}{{ nt.tag.name }}{% if not loop.last %}, {% endif %}{% endfor %}{% endif %}"
            placeholder="python, 算法, 入门 (逗号分隔)">
    </div>

    <div class="editor-wrapper">
        <div id="editor" style="min-height:500px;"></div>
    </div>

    <div style="margin-top:1rem;display:flex;gap:0.5rem;">
        <button type="submit" class="btn btn-lg">保存</button>
        {% if note %}
        <button class="btn btn-danger"
            hx-delete="/notes/{{ note.id }}"
            hx-confirm="确定删除此笔记？"
            hx-target="body">删除</button>
        {% endif %}
    </div>
</form>
{% endblock %}

{% block scripts %}
<script>
(function() {
    var Editor = toastui.Editor;
    var initialValue = document.getElementById("content").value;

    var editor = new Editor({
        el: document.querySelector("#editor"),
        initialEditType: "wysiwyg",
        previewStyle: "tab",
        height: "500px",
        initialValue: initialValue,
        placeholder: "开始写作...",
        toolbarItems: [
            ["heading", "bold", "italic", "strike"],
            ["hr", "quote"],
            ["ul", "ol", "task"],
            ["table", "link"],
            ["code", "codeblock"],
            ["scrollSync"]
        ],
        usageStatistics: false
    });

    var form = document.getElementById("note-form");
    var contentInput = document.getElementById("content");

    form.addEventListener("formdata", function() {
        contentInput.value = editor.getMarkdown();
    });
})();
</script>
{% endblock %}
